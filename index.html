<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💕 Love Tic-Tac-Toe</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #ffe5ec;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    h1 {
      color: #d6336c;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      margin-top: 20px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: #fff0f6;
      border: 2px solid #f783ac;
      font-size: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    #message {
      margin-top: 20px;
      font-size: 1.2rem;
      padding: 15px;
      background: #fff3f3;
      border: 2px solid #f783ac;
      border-radius: 10px;
      max-width: 300px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>💕 Love Tic-Tac-Toe</h1>
  <div id="board"></div>
  <div id="message">Your move, my love 💖</div>

  <script>
    const board = Array(9).fill(null);
    const player = '💖';
    const computer = '🌙';
    const winMessages = [
      "You win! Just like you won my heart 💘",
      "Victory! You always outsmart me 😍",
      "Queen of strategy and of my world 👑"
    ];

    const messageBox = document.getElementById('message');
    const boardEl = document.getElementById('board');

    function drawBoard() {
      boardEl.innerHTML = '';
      board.forEach((cell, i) => {
        const div = document.createElement('div');
        div.classList.add('cell');
        div.textContent = cell || '';
        div.addEventListener('click', () => playerMove(i));
        boardEl.appendChild(div);
      });
    }

    function playerMove(index) {
      if (board[index] || checkWinner()) return;
      board[index] = player;
      drawBoard();
      if (checkWinner()) {
        messageBox.textContent = winMessages[Math.floor(Math.random() * winMessages.length)];
      } else {
        setTimeout(computerMove, 500);
      }
    }

    function computerMove() {
      const empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
      if (empty.length === 0) return;
      const move = empty[Math.floor(Math.random() * empty.length)];
      board[move] = computer;
      drawBoard();
      if (checkWinner()) {
        messageBox.textContent = "Oops! The computer wins 😳 Try again?";
      } else if (!board.includes(null)) {
        messageBox.textContent = "It's a draw! But we're both winners 🥰";
      }
    }

    function checkWinner() {
      const winPatterns = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
      ];
      for (const [a,b,c] of winPatterns) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
      }
      return null;
    }

    drawBoard();
  </script>
</body>
</html>
